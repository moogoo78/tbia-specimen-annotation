# Convenience compose for the app services. DuckDB + SQLite are embedded files
# in ./data (no database container). Run `make ingest` and `make seed` on the
# host first to populate ./data, then `docker compose up`.
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      NDB_DUCKDB_PATH: /data/occurrences.duckdb
      NDB_SQLITE_PATH: /data/annotations.sqlite

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY: http://backend:8000
    depends_on:
      - backend
