# Convenience compose for the app services. DuckDB + SQLite are embedded files
# in ./data (no database container). Run `make ingest` and `make seed` on the
# host first to populate ./data, then `docker compose up`.
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      NDB_DUCKDB_PATH: /data/occurrences.duckdb
      NDB_SQLITE_PATH: /data/annotations.sqlite

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Named volume (not an anonymous one) shadows the host bind-mount so the
      # image's installed node_modules is used. Named = explicit, survives
      # `docker volume prune`, and easy to reset: `docker compose down -v`.
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_PROXY: http://backend:8000
    depends_on:
      - backend

volumes:
  frontend_node_modules:
